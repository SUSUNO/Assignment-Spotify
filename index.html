<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <!-- Use Google Fontas (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">


            <div class="library-section">
                <div class="library-header">
                    <span><i class="fa-solid fa-book"></i> Your Library</span>
                    <i class="fa-solid fa-plus add-btn"></i>
                </div>
                <div class="library-content" id="sidebar-albums">
                    <!-- Sidebar albums injected here -->
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="main-content-area">
            <!-- Top Navbar -->
            <div class="top-nav">

                <div class="nav-actions">

                </div>
            </div>

            <!-- Home / Albums View -->
            <div class="albums-view" id="albums-view">
                <h2>Featured Albums</h2>
                <div class="cards-container" id="albums-container">
                    <!-- Album cards injected here -->
                </div>
            </div>

            <!-- Single Album View -->
            <div class="single-album-view hidden" id="single-album-view">
                <div class="album-header">
                    <img src="" alt="Album Cover" id="header-album-cover">
                    <div class="album-info">
                        <span>Album</span>
                        <h1 id="header-album-title">Album Title</h1>
                        <p id="header-album-artist">Artist Name</p>
                    </div>
                </div>
                <div class="album-actions">
                    <button class="play-btn-large" id="album-play-btn"><i class="fa-solid fa-play"></i></button>
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-solid fa-ellipsis"></i>
                </div>
                <div class="songs-list">
                    <div class="songs-list-header">
                        <div class="col-main"># Title</div>
                        <div class="col-album">Album</div>
                        <div class="col-time"><i class="fa-regular fa-clock"></i></div>
                    </div>
                    <div class="songs-container" id="songs-container">
                        <!-- Songs injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Player -->
    <div class="player">
        <div class="player-left">
            <img src="" alt="Song Cover" id="player-cover" class="hidden">
            <div class="track-info">
                <span class="track-name" id="player-title"></span>
                <span class="track-artist" id="player-artist"></span>
            </div>
            <i class="fa-regular fa-heart" id="player-like" style="opacity: 0;"></i>
        </div>
        <div class="player-center">
            <div class="player-controls">
                <button><i class="fa-solid fa-shuffle"></i></button>
                <button id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
                <button class="play-pause" id="play-pause-btn"><i class="fa-solid fa-circle-play"></i></button>
                <button id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
                <button><i class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="playback-bar">
                <span id="current-time">0:00</span>
                <input type="range" min="0" max="100" value="0" class="progress-bar" id="progress-bar">
                <span id="total-time">0:00</span>
            </div>
        </div>
        <div class="player-right">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
